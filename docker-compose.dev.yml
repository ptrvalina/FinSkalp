name: flowsint-dev

services:
  postgres:
    image: postgres:15
    container_name: flowsint-postgres-dev
    restart: always
    environment:
      POSTGRES_USER: flowsint
      POSTGRES_PASSWORD: flowsint
      POSTGRES_DB: flowsint
    ports:
      - "5433:5432"
    volumes:
      - pg_data_dev:/var/lib/postgresql/data
    networks:
      - flowsint_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowsint"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: flowsint-redis-dev
    ports:
      - "6379:6379"
    networks:
      - flowsint_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5
    container_name: flowsint-neo4j-dev
    ports:
      - "7474:7474" # Web UI
      - "7687:7687" # Bolt
    environment:
      - NEO4J_AUTH=${NEO4J_USERNAME}/${NEO4J_PASSWORD}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use__neo4j__config=true
    volumes:
      - neo4j_data_dev:/data
      - neo4j_logs_dev:/logs
      - neo4j_import_dev:/var/lib/neo4j/import
      - neo4j_plugins_dev:/plugins
    restart: unless-stopped
    networks:
      - flowsint_network
    healthcheck:
      test: cypher-shell -u ${NEO4J_USERNAME} -p ${NEO4J_PASSWORD} "RETURN 1"
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: flowsint-api/Dockerfile
      target: dev
    container_name: flowsint-api-dev
    restart: unless-stopped
    ports:
      - "5001:5001"
    volumes:
      - ./flowsint-api:/app/flowsint-api
      - /app/flowsint-api/.venv
      - ./flowsint-core:/app/flowsint-core
      - ./flowsint-types:/app/flowsint-types
      - ./flowsint-enrichers:/app/flowsint-enrichers
      - ./flowsint-crypto-compliance:/app/flowsint-crypto-compliance
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - DATABASE_URL=postgresql://flowsint:flowsint@postgres:5432/flowsint
      - NEO4J_URI_BOLT=bolt://neo4j:7687
      - NEO4J_USERNAME=${NEO4J_USERNAME}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - AUTH_SECRET=${AUTH_SECRET}
      - MASTER_VAULT_KEY_V1=${MASTER_VAULT_KEY_V1}
      - REDIS_URL=redis://redis:6379/0
      - SKIP_MIGRATIONS=${SKIP_MIGRATIONS:-true}
      - COMPLIANCE_COMBAT_MODE=${COMPLIANCE_COMBAT_MODE:-1}
      - COMPLIANCE_DEMO_MODE=${COMPLIANCE_DEMO_MODE:-0}
      - COMPLIANCE_INVESTIGATE_TIMEOUT_SEC=${COMPLIANCE_INVESTIGATE_TIMEOUT_SEC:-900}
      - FINSKALP_ENTITY_STORE=${FINSKALP_ENTITY_STORE:-postgres}
      - FINSKALP_FUSION_MODE=${FINSKALP_FUSION_MODE:-rfc0003}
      - FINSKALP_ECCF_POSTGRES_PERSISTENCE=${FINSKALP_ECCF_POSTGRES_PERSISTENCE:-1}
      - FINSKALP_WORKSPACE_FULL_PANELS=${FINSKALP_WORKSPACE_FULL_PANELS:-1}
      - FINSKALP_ENTERPRISE_REPORT_SECTIONS=${FINSKALP_ENTERPRISE_REPORT_SECTIONS:-1}
      - FINSKALP_IDOO_REAL_HEALTH_PROBES=${FINSKALP_IDOO_REAL_HEALTH_PROBES:-1}
      - TRONGRID_API_KEY=${TRONGRID_API_KEY:-}
      - ETHERSCAN_API_KEY=${ETHERSCAN_API_KEY:-}
      - BSCSCAN_API_KEY=${BSCSCAN_API_KEY:-}
      - POLYGONSCAN_API_KEY=${POLYGONSCAN_API_KEY:-}
      - BITCOINABUSE_API_KEY=${BITCOINABUSE_API_KEY:-}
      - FINSKALP_TOR_SOCKS=${FINSKALP_TOR_SOCKS:-}
      - FINSKALP_TRON_PROVIDER=${FINSKALP_TRON_PROVIDER:-failover}
      - FINSKALP_COMBAT_SEED_ADDRESS=${FINSKALP_COMBAT_SEED_ADDRESS:-}
      - FINSKALP_COMBAT_SEED_CHAIN=${FINSKALP_COMBAT_SEED_CHAIN:-tron}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - flowsint_network

  celery:
    build:
      context: .
      dockerfile: flowsint-api/Dockerfile
      target: dev
    container_name: flowsint-celery-dev
    restart: unless-stopped
    command: >
      celery -A flowsint_core.core.celery worker --loglevel=info --pool=threads --concurrency=10
      -Q celery,scalpel-onchain,scalpel-sanctions,scalpel-username,scalpel-abuse,scalpel-darknet,scalpel-clearnet,scalpel-vasp,scalpel-court,scalpel-dns,scalpel-fusion,scalpel-enforcement,live-onchain,live-sanctions,live-abuse,live-username,live-darknet
    volumes:
      - ./flowsint-api:/app/flowsint-api
      - /app/flowsint-api/.venv
      - ./flowsint-core:/app/flowsint-core
      - ./flowsint-types:/app/flowsint-types
      - ./flowsint-enrichers:/app/flowsint-enrichers
      - ./flowsint-crypto-compliance:/app/flowsint-crypto-compliance
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - DATABASE_URL=postgresql://flowsint:flowsint@postgres:5432/flowsint
      - NEO4J_URI_BOLT=bolt://neo4j:7687
      - NEO4J_USERNAME=${NEO4J_USERNAME}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - MASTER_VAULT_KEY_V1=${MASTER_VAULT_KEY_V1}
      - REDIS_URL=redis://redis:6379/0
      - SKIP_MIGRATIONS=true
      - AUTH_SECRET=${AUTH_SECRET}
      - COMPLIANCE_COMBAT_MODE=${COMPLIANCE_COMBAT_MODE:-1}
      - COMPLIANCE_DEMO_MODE=${COMPLIANCE_DEMO_MODE:-0}
      - COMPLIANCE_INVESTIGATE_TIMEOUT_SEC=${COMPLIANCE_INVESTIGATE_TIMEOUT_SEC:-900}
      - FINSKALP_ENTITY_STORE=${FINSKALP_ENTITY_STORE:-postgres}
      - FINSKALP_FUSION_MODE=${FINSKALP_FUSION_MODE:-rfc0003}
      - FINSKALP_ECCF_POSTGRES_PERSISTENCE=${FINSKALP_ECCF_POSTGRES_PERSISTENCE:-1}
      - FINSKALP_WORKSPACE_FULL_PANELS=${FINSKALP_WORKSPACE_FULL_PANELS:-1}
      - FINSKALP_ENTERPRISE_REPORT_SECTIONS=${FINSKALP_ENTERPRISE_REPORT_SECTIONS:-1}
      - TRONGRID_API_KEY=${TRONGRID_API_KEY:-}
      - ETHERSCAN_API_KEY=${ETHERSCAN_API_KEY:-}
      - BSCSCAN_API_KEY=${BSCSCAN_API_KEY:-}
      - POLYGONSCAN_API_KEY=${POLYGONSCAN_API_KEY:-}
      - BITCOINABUSE_API_KEY=${BITCOINABUSE_API_KEY:-}
      - FINSKALP_TOR_SOCKS=${FINSKALP_TOR_SOCKS:-}
      - FINSKALP_TRON_PROVIDER=${FINSKALP_TRON_PROVIDER:-failover}
    healthcheck:
      # Celery has no HTTP server — Dockerfile's curl-based healthcheck always fails.
      # Use celery's own ping primitive instead.
      test: ["CMD-SHELL", "celery -A flowsint_core.core.celery inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - flowsint_network

  app:
    build:
      context: ./flowsint-app
      dockerfile: Dockerfile.dev
    container_name: flowsint-app-dev
    ports:
      - "5173:5173"
    volumes:
      - ./flowsint-app:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=${VITE_API_URL}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - flowsint_network
    stdin_open: true
    tty: true

networks:
  flowsint_network:
    name: flowsint_network_dev
    driver: bridge

volumes:
  pg_data_dev:
  neo4j_data_dev:
  neo4j_logs_dev:
  neo4j_import_dev:
  neo4j_plugins_dev:
