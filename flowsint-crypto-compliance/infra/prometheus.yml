global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: flowsint-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - flowsint-api-prod:5001
        labels:
          service: flowsint-api
          environment: prod

  - job_name: flowsint-compliance-demo
    metrics_path: /api/compliance/metrics
    static_configs:
      - targets:
          - host.docker.internal:8877
        labels:
          service: flowsint-compliance-ops
          environment: demo
    # Disable when demo stand is not running on the host.
    scrape_interval: 60s

rule_files:
  - /etc/prometheus/alerts.yml
