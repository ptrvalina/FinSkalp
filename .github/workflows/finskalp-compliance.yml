name: FinSkalp compliance tests

on:
  pull_request:
    paths:
      - "flowsint-crypto-compliance/**"
      - "flowsint-types/**"
      - "flowsint-core/**"
      - "flowsint-api/Dockerfile"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/finskalp-compliance.yml"
  push:
    branches:
      - main
    paths:
      - "flowsint-crypto-compliance/**"
      - "flowsint-types/**"
      - "flowsint-core/**"
      - "flowsint-api/Dockerfile"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/finskalp-compliance.yml"

concurrency:
  group: finskalp-compliance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: flowsint-crypto-compliance pytest
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install workspace deps (isolated)
        run: |
          python -m pip install --upgrade pip
          pip install -e flowsint-types -e flowsint-core
          pip install -e "flowsint-crypto-compliance[dev]"

      - name: Run compliance test suite
        working-directory: flowsint-crypto-compliance
        env:
          AUTH_SECRET: ci-only-dummy-secret
          REDIS_URL: redis://127.0.0.1:6379/0
          PYTHONPATH: src:../flowsint-types/src:../flowsint-core/src
        run: |
          pytest \
            tests/test_security_hardening.py \
            tests/test_ftm_adapter.py \
            tests/test_graph_phase3.py \
            tests/test_on_chain_provider.py \
            tests/test_solana_collector.py \
            tests/test_enterprise_report_sections.py \
            tests/test_eccf_postgres_persistence.py \
            tests/test_idoo_maturity_hardening.py \
            tests/test_rfc0021_idoo.py \
            tests/test_wave5_closure.py \
            tests/test_infrastructure.py \
            tests/test_forensic_enrichment.py \
            tests/test_demo_compliance.py \
            tests/test_fz115_report.py \
            tests/test_multi_dimensional_confidence.py \
            tests/test_operator_events.py \
            -q --tb=short

  docker-api-image:
    name: Verify flowsint-api Docker image (migrations in image)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build production API image
        run: docker build -f flowsint-api/Dockerfile --target production -t flowsint-api:ci .
